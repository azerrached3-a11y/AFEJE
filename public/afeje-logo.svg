<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background for social media -->
  <rect width="800" height="800" fill="#000000"/>
  <circle cx="400" cy="400" r="380" fill="#050505"/>

  <defs>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind core -->
  <circle cx="400" cy="400" r="112" fill="url(#coreGlow)"/>

  <!-- Pulsing outer rings -->
  <circle cx="400" cy="400" r="88" stroke="#00FFFF" stroke-width="3" opacity="0.15"/>
  <circle cx="400" cy="400" r="64" stroke="#00FFFF" stroke-width="4" opacity="0.25"/>

  <!-- Central core -->
  <circle cx="400" cy="400" r="28" fill="#00FFFF" filter="url(#glow)"/>

  <!-- Branch 1 — top -->
  <line x1="400" y1="368" x2="400" y2="180" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="400" y1="180" x2="344" y2="88" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="400" y1="180" x2="456" y2="88" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch 2 — top right -->
  <line x1="428" y1="380" x2="600" y2="240" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="600" y1="240" x2="696" y2="216" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="600" y1="240" x2="648" y2="152" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch 3 — bottom right -->
  <line x1="428" y1="420" x2="600" y2="560" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="600" y1="560" x2="696" y2="584" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="600" y1="560" x2="648" y2="648" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch 4 — bottom -->
  <line x1="400" y1="432" x2="400" y2="620" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="400" y1="620" x2="344" y2="712" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="400" y1="620" x2="456" y2="712" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch 5 — bottom left -->
  <line x1="372" y1="420" x2="200" y2="560" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="560" x2="104" y2="584" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="560" x2="152" y2="648" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Branch 6 — top left -->
  <line x1="372" y1="380" x2="200" y2="240" stroke="white" stroke-width="10" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="104" y2="216" stroke="white" stroke-width="8" stroke-linecap="round"/>
  <line x1="200" y1="240" x2="152" y2="152" stroke="white" stroke-width="8" stroke-linecap="round"/>

  <!-- Tip glow dots -->
  <circle cx="344" cy="88" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="344" cy="88" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="456" cy="88" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="456" cy="88" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>

  <circle cx="696" cy="216" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="696" cy="216" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="648" cy="152" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="648" cy="152" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>

  <circle cx="696" cy="584" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="696" cy="584" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="648" cy="648" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="648" cy="648" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>

  <circle cx="344" cy="712" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="344" cy="712" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="456" cy="712" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="456" cy="712" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>

  <circle cx="104" cy="584" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="104" cy="584" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="152" cy="648" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="152" cy="648" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>

  <circle cx="104" cy="216" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="104" cy="216" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
  <circle cx="152" cy="152" r="16" fill="#00FFFF" opacity="0.1"/>
  <circle cx="152" cy="152" r="10" fill="#00FFFF" opacity="0.7" filter="url(#glowSm)"/>
</svg>
