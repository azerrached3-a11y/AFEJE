<svg width="800" height="800" viewBox="0 0 800 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for social media -->
  <rect width="800" height="800" fill="#000000"/>
  <circle cx="400" cy="400" r="380" fill="#050505"/>

  <defs>
    <radialGradient id="apexGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ambientGlow" cx="50%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#00FFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00FFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowBig">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glowSm">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Ambient glow -->
  <circle cx="400" cy="340" r="240" fill="url(#ambientGlow)"/>

  <!-- Main "A" legs -->
  <line x1="232" y1="588" x2="400" y2="112" stroke="white" stroke-width="14" stroke-linecap="round"/>
  <line x1="568" y1="588" x2="400" y2="112" stroke="white" stroke-width="14" stroke-linecap="round"/>

  <!-- Cyan crossbar -->
  <line x1="288" y1="472" x2="512" y2="472" stroke="#00FFFF" stroke-width="10" stroke-linecap="round"/>

  <!-- Growth branches from apex -->
  <line x1="400" y1="112" x2="328" y2="32" stroke="white" stroke-width="9" stroke-linecap="round"/>
  <line x1="400" y1="112" x2="472" y2="32" stroke="white" stroke-width="9" stroke-linecap="round"/>

  <!-- Base forks — left -->
  <line x1="232" y1="588" x2="160" y2="668" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="232" y1="588" x2="248" y2="680" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Base forks — right -->
  <line x1="568" y1="588" x2="640" y2="668" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <line x1="568" y1="588" x2="552" y2="680" stroke="white" stroke-width="7" stroke-linecap="round"/>

  <!-- Apex glow -->
  <circle cx="400" cy="112" r="48" fill="url(#apexGlow)"/>
  <circle cx="400" cy="112" r="20" fill="#00FFFF" filter="url(#glowBig)"/>

  <!-- Crossbar nodes -->
  <circle cx="288" cy="472" r="12" fill="#00FFFF" filter="url(#glowSm)" opacity="0.85"/>
  <circle cx="512" cy="472" r="12" fill="#00FFFF" filter="url(#glowSm)" opacity="0.85"/>

  <!-- Apex branch tips -->
  <circle cx="328" cy="32" r="8" fill="#00FFFF" opacity="0.7"/>
  <circle cx="472" cy="32" r="8" fill="#00FFFF" opacity="0.7"/>

  <!-- Base fork tips -->
  <circle cx="160" cy="668" r="7" fill="#00FFFF" opacity="0.6"/>
  <circle cx="248" cy="680" r="7" fill="#00FFFF" opacity="0.6"/>
  <circle cx="640" cy="668" r="7" fill="#00FFFF" opacity="0.6"/>
  <circle cx="552" cy="680" r="7" fill="#00FFFF" opacity="0.6"/>

  <!-- Base leg nodes -->
  <circle cx="232" cy="588" r="10" fill="white" opacity="0.4"/>
  <circle cx="568" cy="588" r="10" fill="white" opacity="0.4"/>
</svg>
